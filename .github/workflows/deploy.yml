name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; let in-progress production deploys finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1) Build the Kotlin Multiplatform core's JS library first — web/ consumes it
      #    via a local link (web/package.json: "noveditor-core": "link:../core/...").
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Build Kotlin core (JS library)
        run: ./gradlew :core:jsBrowserProductionLibraryDistribution --no-daemon

      # 2) Build the web app against the freshly built core.
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml
      - name: Install web dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web
      - name: Build web (base=/noveditor/)
        run: pnpm build
        working-directory: web

      # 3) Upload the built site (web/dist) as the Pages artifact.
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
